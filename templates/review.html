<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Review Us | Meal Prep</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>

    :root {
        --bg: #f6f5f1;
        --card: #ffffff;
        --text: #1f1f1f;
        --muted: #6c757d;
        --primary: #4B5320;
        --border: #e5e7eb;
    }

    /* DARK MODE */
    body.dark {
        --bg: #020617;
        --card: #0f172a;
        --text: #f1f1f1;
        --muted: #9ca3af;
        --border: #1f2937;
    }

    body {
        background: var(--bg);
        color: var(--text);
        font-family: 'Poppins', sans-serif;
        transition: background .3s, color .3s;
    }

    .review-wrapper {
        min-height: 70vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding-top: 100px;
        padding-bottom: 60px;
    }

    .review-card {
        background: var(--card);
        color: var(--text);
        border-radius: 20px;
        padding: 32px;
        box-shadow: 0 20px 40px rgba(0,0,0,.25);
    }

    .review-card h3 {
        font-weight: 700;
        margin-bottom: 6px;
    }

    .review-card p {
        color: var(--muted);
        font-size: 14px;
        margin-bottom: 20px;
    }

    /* Stars */
    .stars {
        display: flex;
        gap: 10px;
        font-size: 28px;
        cursor: pointer;
        margin-bottom: 20px;
    }

    .stars span {
        color: #374151;
        transition: transform .2s, color .2s;
    }

    body.dark .stars span {
        color: #64748b;
        transition: transform .2s, color .2s;
    }
    
    .stars span.active,
    .stars span:hover {
        color: #facc15;
        transform: scale(1.2);
    }

    body.dark .stars span.active,
    .stars span:hover {
        color: #facc15;
        transform: scale(1.2);
    }

    textarea {
        background: var(--bg);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px;
        resize: none;
    }

    textarea::placeholder {
        color: var(--muted);
    }

    textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(75,83,32,.25);
    }

    .btn-submit {
      background: var(--primary);
      color: white;
      border-radius: 12px;
      padding: 12px;
      font-weight: 600;
      width: 100%;
    }

    .btn-submit:hover {
      background: #3b4318;
    }
  </style>
</head>
<body>

  {% include "navbar.html" %}

  <div class="review-wrapper">
    <form class="review-card" method="POST">

      <h3>⭐ Enjoying your meal plan?</h3>
      <p>Your feedback helps us improve and build better health experiences.</p>

      <!-- Rating -->
      <input type="hidden" name="rating" id="rating">

      <div class="stars" id="stars">
        <span data-val="1">★</span>
        <span data-val="2">★</span>
        <span data-val="3">★</span>
        <span data-val="4">★</span>
        <span data-val="5">★</span>
      </div>

      <!-- Message -->
      <textarea name="feedback"
                rows="5" cols="50"
                placeholder="Tell us what you liked or what we can improve…"
                required></textarea>

      <button class="btn btn-submit mt-3">
        Submit Review
      </button>

    </form>
  </div>

  {% include "footer.html" %}

  <script>
    const stars = document.querySelectorAll("#stars span");
    const ratingInput = document.getElementById("rating");

    stars.forEach(star => {
      star.addEventListener("click", () => {
        const value = star.dataset.val;
        ratingInput.value = value;

        stars.forEach(s => {
          s.classList.toggle("active", s.dataset.val <= value);
        });
      });
    });
  </script>

</body>
</html>
