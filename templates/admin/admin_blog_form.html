{% extends "admin/admin_base.html" %}
{% block title %}New Blog | Admin{% endblock %}
{% block page_title %}Create Blog{% endblock %}

{% block content %}

<div class="card p-4">

<form method="POST">

  <div class="mb-3">
    <label class="form-label">Title</label>
    <input type="text" name="title" class="form-control" required>
  </div>

  <div class="mb-3">
    <label class="form-label">Category</label>
    <select name="category" class="form-control" required>
      <option>Nutrition Basics</option>
      <option>Fitness</option>
      <option>Disease</option>
      <option>Other</option>
    </select>
  </div>

  <div class="mb-3">
    <label class="form-label">Summary</label>
    <textarea name="summary" class="form-control" rows="2"></textarea>
  </div>

  <div class="mb-3">
    <label class="form-label">Content</label>
    <textarea name="content" class="form-control" rows="8" required></textarea>
  </div>

  <div class="form-check mb-3">
    <input class="form-check-input" type="checkbox" name="is_published" checked>
    <label class="form-check-label">Publish immediately</label>
  </div>

  <button class="btn btn-success">Save Blog</button>
  <a href="/admin/blogs" class="btn btn-outline-secondary">Cancel</a>

</form>

</div>

{% endblock %}
