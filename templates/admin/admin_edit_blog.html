{% extends "admin/admin_base.html" %}
{% block title %}Edit Blog{% endblock %}

{% block content %}

<h2 class="fw-bold mb-4">Edit Blog</h2>

<div class="card p-4">

<form method="POST">

  <div class="mb-3">
    <label class="form-label">Title</label>
    <input class="form-control" name="title" value="{{ blog.title }}" required>
  </div>

  <div class="mb-3">
    <label class="form-label">Summary</label>
    <textarea class="form-control" rows="2" name="summary">{{ blog.summary }}</textarea>
  </div>

  <div class="mb-3">
    <label class="form-label">Content</label>
    <textarea class="form-control" rows="10" name="content" required>{{ blog.content }}</textarea>
  </div>

  <div class="mb-3">
    <label class="form-label">Category</label>
    <input class="form-control" name="category" value="{{ blog.category }}">
  </div>

  <div class="form-check mb-4">
    <input class="form-check-input" type="checkbox"
           name="is_published" value="1"
           {% if blog.is_published %}checked{% endif %}>
    <label class="form-check-label">Published</label>
  </div>

  <button class="btn btn-success">Save Changes</button>
  <a href="/admin/blogs" class="btn btn-outline-secondary ms-2">Cancel</a>

</form>
</div>

{% endblock %}
