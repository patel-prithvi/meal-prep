<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Verify OTP | Meal Prep</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #4B5320;
      --bg-light: #f6f5f1;
      --bg-card: #ffffff;
      --text-dark: #1f1f1f;
      --text-muted: #6c757d;
      --border: #e5e7eb;
    }

    body.dark-mode {
      --bg-light: #020617;
      --bg-card: #0f172a;
      --text-dark: #f1f5f9;
      --text-muted: #9ca3af;
      --border: #1f2937;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg-light);
      color: var(--text-dark);
      margin: 0;
      transition: 0.3s ease;
    }

    /* Navbar */
    /* ===== NAVBAR ===== */
    .navbar {
        background: var(--bg-card);
        border-bottom: 1px solid var(--border);
        padding: 14px 40px;

        display: flex;
        justify-content: space-between;
        align-items: center;

        position: relative;
        z-index: 1000;
    }

    /* LEFT SIDE */
    .nav-left .brand {
        display: flex;
        align-items: center;
        gap: 10px;

        font-size: 20px;
        font-weight: 600;
        text-decoration: none;
        color: var(--text-dark);
    }

    /* RIGHT SIDE */
    .nav-right {
        display: flex;
        align-items: center;
    }

    /* TOGGLE BUTTON */
    .theme-toggle {
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 6px 12px;
        cursor: pointer;
        font-size: 18px;
        transition: 0.3s ease;
    }

    .theme-toggle:hover {
        background: rgba(0,0,0,0.05);
    }

    body.dark-mode .theme-toggle:hover {
        background: rgba(255,255,255,0.08);
    }


    /* Center Container */
    .verify-wrapper {
      min-height: 85vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .verify-card {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
      transition: 0.3s ease;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 10px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: var(--text-muted);
      margin-bottom: 30px;
      font-size: 14px;
    }

    /* OTP Boxes */
    .otp-container {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 25px;
    }

    .otp-input {
      width: 55px;
      height: 60px;
      text-align: center;
      font-size: 20px;
      font-weight: 600;
      border-radius: 12px;
      border: 2px solid var(--border);
      background: var(--bg-light);
      color: var(--text-dark);
      transition: 0.2s ease;
    }

    .otp-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(75,83,32,0.2);
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-weight: 600;
      background: var(--primary);
      color: white;
      transition: 0.2s ease;
    }

    button:hover {
      opacity: 0.9;
    }

    .top-right {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
      color: var(--text-muted);
    }

    .top-right a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }

    .alert {
      border-radius: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-left">
      <a href="/" class="brand">
        <img src="/static/images/logo.png" height="32">
        <span>Meal Planner</span>
      </a>
    </div>

    <div class="nav-right">
      <button class="theme-toggle" id="darkModeToggle">
        <span id="themeIcon">🌙</span>
      </button>
    </div>
  </nav>


  <div class="verify-wrapper">
    <div class="verify-card">

      <h1>Verify Your Email</h1>
      <p class="subtitle">Enter the 6-digit code sent to your email</p>

      <form method="POST" id="otpForm">

        <div class="otp-container">
          <input type="text" maxlength="1" class="otp-input">
          <input type="text" maxlength="1" class="otp-input">
          <input type="text" maxlength="1" class="otp-input">
          <input type="text" maxlength="1" class="otp-input">
          <input type="text" maxlength="1" class="otp-input">
          <input type="text" maxlength="1" class="otp-input">
        </div>

        <!-- Hidden input -->
        <input type="hidden" name="otp" id="finalOtp">

        <button type="submit">Verify & Continue</button>

      </form>

      <!-- Flash Messages -->
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }} mt-3">
              {{ message }}
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      

    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // Dark mode toggle
    const toggle = document.getElementById("darkModeToggle");
    const icon = document.getElementById("themeIcon");

    if (localStorage.getItem("theme") === "dark") {
      document.body.classList.add("dark-mode");
      icon.textContent = "☀️";
    }

    toggle.addEventListener("click", () => {
      document.body.classList.toggle("dark-mode");
      if (document.body.classList.contains("dark-mode")) {
        icon.textContent = "☀️";
        localStorage.setItem("theme", "dark");
      } else {
        icon.textContent = "🌙";
        localStorage.setItem("theme", "light");
      }
    });

    // OTP Auto Focus & Combine
    const inputs = document.querySelectorAll(".otp-input");
    const finalOtp = document.getElementById("finalOtp");

    inputs.forEach((input, index) => {
      input.addEventListener("input", (e) => {
        if (!/^[0-9]$/.test(e.target.value)) {
          e.target.value = "";
          return;
        }
        if (index < inputs.length - 1) {
          inputs[index + 1].focus();
        }
      });

      input.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && !input.value && index > 0) {
          inputs[index - 1].focus();
        }
      });
    });

    document.getElementById("otpForm").addEventListener("submit", function() {
      let otpValue = "";
      inputs.forEach(input => otpValue += input.value);
      finalOtp.value = otpValue;
    });
  </script>

</body>
</html>
