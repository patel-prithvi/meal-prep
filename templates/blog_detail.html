<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ blog.title }} | Meal Prep</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root {
      --bg: #f6f5f1;
      --card: #ffffff;
      --text: #1f1f1f;
      --muted: #6c757d;
      --primary: #4B5320;
      --border: #e5e7eb;
    }

    body.dark {
      --bg: #020617;
      --card: #0f172a;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --border: #1f2933;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Poppins', sans-serif;
      transition: background .3s, color .3s;
    }

    .blog-detail {
      max-width: 900px;
      margin: 60px auto;
      padding: 30px;
      background: var(--card);
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    .blog-detail h1 {
      font-weight: 700;
      margin-bottom: 10px;
    }

    .blog-meta {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 25px;
    }

    .blog-content {
      line-height: 1.8;
      font-size: 16px;
    }

    .blog-content h3 {
      margin-top: 30px;
      font-weight: 600;
    }

    .blog-content ul {
      padding-left: 20px;
    }

    .category-badge {
      background: rgba(75,83,32,.15);
      color: var(--primary);
      font-size: 13px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 15px;
    }
  </style>
</head>

<body>

{% include "navbar.html" %}

<div class="blog-detail">

  <span class="category-badge">{{ blog.category }}</span>

  <h1>{{ blog.title }}</h1>

  <div class="blog-meta">
    Published on {{ blog.created_at.strftime('%d %B %Y') }}
  </div>

  <div class="blog-content">
    {{ blog.content | replace('\n', '<br>') | safe }}
  </div>

</div>

{% include "footer.html" %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
